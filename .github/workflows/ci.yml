name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            archive_name: crondrop-linux-x86_64
            binary_name: crondrop
            package_script: ./scripts/package-release.sh
          - os: macos-latest
            label: macos-aarch64
            archive_name: crondrop-macos-aarch64
            binary_name: crondrop
            package_script: ./scripts/package-release.sh
          - os: windows-latest
            label: windows-x86_64
            archive_name: crondrop-windows-x86_64
            binary_name: crondrop.exe
            package_script: ./scripts/package-release.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p crondrop

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "${{ matrix.package_script }}"
          "${{ matrix.package_script }}" "${{ matrix.archive_name }}" "target/release/${{ matrix.binary_name }}"

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${{ matrix.package_script }}" "${{ matrix.archive_name }}" "target/release/${{ matrix.binary_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}.*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Release ${tag} for crondrop

          Included artifacts:
          - Linux x86_64 archive
          - macOS aarch64 archive
          - Windows x86_64 archive
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-artifacts/**/* --clobber
          else
            gh release create "$tag" release-artifacts/**/* --title "$tag" --notes-file "$notes_file"
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ secrets.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_GIT_NAME: AlTosterino
          HOMEBREW_TAP_GIT_EMAIL: altosterino@gmail.com
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" || -z "${HOMEBREW_TAP_REPOSITORY}" ]]; then
            echo "Skipping Homebrew tap update. Set HOMEBREW_TAP_GITHUB_TOKEN and HOMEBREW_TAP_REPOSITORY to enable automation."
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          tap_dir="$(mktemp -d)"
          linux_archive="$(find release-artifacts -name 'crondrop-linux-x86_64.tar.gz' -print -quit)"
          macos_archive="$(find release-artifacts -name 'crondrop-macos-aarch64.tar.gz' -print -quit)"

          if [[ -z "${linux_archive}" || -z "${macos_archive}" ]]; then
            echo "release artifacts not found for Homebrew tap update" >&2
            exit 1
          fi

          linux_sha="$(sha256sum "${linux_archive}" | awk '{print $1}')"
          macos_sha="$(sha256sum "${macos_archive}" | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "${tap_dir}"

          ./scripts/update-homebrew-tap.sh \
            "${tap_dir}" \
            "${GITHUB_REPOSITORY}" \
            "${tag}" \
            "${linux_sha}" \
            "${macos_sha}"

          cd "${tap_dir}"
          if git diff --quiet; then
            echo "homebrew tap already up to date"
            exit 0
          fi

          git config user.name "${HOMEBREW_TAP_GIT_NAME}"
          git config user.email "${HOMEBREW_TAP_GIT_EMAIL}"
          git add Formula/crondrop.rb README.md
          git commit -m "Update crondrop ${tag}"
          git push origin HEAD
